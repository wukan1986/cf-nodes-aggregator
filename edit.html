<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>链接管理器</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: #333;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* 添加指南样式 */
        .guide {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            border-left: 5px solid #3498db;
        }

        .guide h2 {
            color: #2c3e50;
            margin-bottom: 15px;
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .guide h2 i {
            color: #3498db;
        }

        .guide-content {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .guide-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #e1e8ed;
        }

        .guide-item h3 {
            color: #2c3e50;
            margin-bottom: 8px;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .guide-item p {
            color: #555;
            line-height: 1.5;
            font-size: 0.95rem;
        }

        .type-text {
            color: #3498db;
            font-weight: 600;
        }

        .type-forward {
            color: #9b59b6;
            font-weight: 600;
        }

        .type-redirect {
            color: #e74c3c;
            font-weight: 600;
        }

        /* 原有样式保持不变 */
        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 2.5rem;
        }

        .subtitle {
            color: #7f8c8d;
            font-size: 1.1rem;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .controls-left {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .controls-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .api-input {
            padding: 10px 15px;
            border: 2px solid #e1e8ed;
            border-radius: 8px;
            font-size: 1rem;
            width: 250px;
            transition: border-color 0.3s;
        }

        .api-input:focus {
            border-color: #3498db;
            outline: none;
        }

        .btn {
            background: #3498db;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            background: #2980b9;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.15);
        }

        .btn-load {
            background: #2ecc71;
        }

        .btn-load:hover {
            background: #27ae60;
        }

        .btn-save-all {
            background: #9b59b6;
        }

        .btn-save-all:hover {
            background: #8e44ad;
        }

        .link-count {
            font-size: 1.1rem;
            color: #2c3e50;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
        }

        .status-message {
            padding: 10px 15px;
            border-radius: 6px;
            margin: 10px 0;
            font-weight: 500;
            opacity: 0;
            transform: translateY(-10px);
            transition: all 0.3s ease;
        }

        .status-message.show {
            opacity: 1;
            transform: translateY(0);
        }

        .status-success {
            background-color: #d5f4e6;
            color: #27ae60;
            border: 1px solid #2ecc71;
        }

        .status-error {
            background-color: #fadbd8;
            color: #e74c3c;
            border: 1px solid #e74c3c;
        }

        .status-info {
            background-color: #d6eaf8;
            color: #3498db;
            border: 1px solid #3498db;
        }

        .status-warning {
            background-color: #fef9e7;
            color: #f39c12;
            border: 1px solid #f1c40f;
        }

        .table-container {
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background-color: #34495e;
            color: white;
        }

        th {
            padding: 18px 15px;
            text-align: left;
            font-weight: 600;
            font-size: 1.1rem;
        }

        th:nth-child(1) {
            /* 链接列 */
            width: 25%;
        }

        th:nth-child(2) {
            /* 内容列 */
            width: 65%;
        }

        th:nth-child(3) {
            /* 类型列 */
            width: 10%;
        }

        tbody tr {
            border-bottom: 1px solid #e1e8ed;
            transition: background-color 0.2s;
        }

        tbody tr:hover {
            background-color: #f8f9fa;
        }

        td {
            padding: 15px;
        }

        .link-cell {
            width: 20%;
            min-width: 150px;
        }

        .link {
            color: #3498db;
            text-decoration: none;
            font-weight: 600;
            word-break: break-all;
            display: block;
            padding: 8px 12px;
            background-color: #f8f9fa;
            border-radius: 6px;
            border-left: 4px solid #3498db;
            transition: all 0.2s;
        }

        .link:hover {
            background-color: #e3f2fd;
            cursor: pointer;
        }

        .copied-notice {
            color: #27ae60;
            font-size: 0.85rem;
            margin-top: 5px;
            display: none;
        }

        .textarea-cell {
            width: 65%;
            min-width: 350px;
        }

        textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #e1e8ed;
            border-radius: 6px;
            font-size: 1rem;
            resize: vertical;
            min-height: 80px;
            transition: border-color 0.3s;
        }

        textarea:focus {
            border-color: #3498db;
            outline: none;
        }

        .select-cell {
            width: 15%;
            min-width: 100px;
        }

        select {
            width: 100%;
            padding: 10px;
            border: 2px solid #e1e8ed;
            border-radius: 6px;
            font-size: 1rem;
            background-color: white;
            cursor: pointer;
        }

        .btn-cell {
            min-width: 120px;
        }


        @media (max-width: 768px) {

            th,
            td {
                padding: 10px 8px;
            }

            th:nth-child(1),
            td:nth-child(1) {
                /* 链接列 */
                width: 25%;
                min-width: 120px;
            }

            th:nth-child(2),
            td:nth-child(2) {
                /* 内容列 */
                width: 55%;
                min-width: 200px;
            }

            th:nth-child(3),
            td:nth-child(3) {
                /* 类型列 */
                width: 20%;
                min-width: 80px;
            }

            .guide-content {
                grid-template-columns: 1fr;
            }

            .controls {
                flex-direction: column;
                align-items: stretch;
            }

            .controls-left,
            .controls-right {
                width: 100%;
            }

            .api-input {
                width: 100%;
            }

            .btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- 添加使用指南 -->
        <div class="guide">
            <h2><i class="fas fa-info-circle"></i> 使用指南</h2>
            <div class="guide-content">
                <div class="guide-item">
                    <h3><span class="type-text">文本</span> <i class="fas fa-file-alt"></i></h3>
                    <p>访问网页直接返回内容中的文本内容。适合用于分享纯文本信息，如说明、代码片段、联系方式等。</p>
                </div>
                <div class="guide-item">
                    <h3><span class="type-forward">转发</span> <i class="fas fa-share"></i></h3>
                    <p>访问网页时由服务器爬取目标页面内容并转发给用户。适合需要获取远程内容的场景，兼容性好。</p>
                </div>
                <div class="guide-item">
                    <h3><span class="type-redirect">跳转</span> <i class="fas fa-external-link-alt"></i></h3>
                    <p>访问网页时由浏览器进行302跳转到目标地址。<strong>注意：</strong>部分软件不支持302跳转，此时请选择"转发"类型。</p>
                </div>
            </div>
        </div>

        <h1>链接管理器</h1>
        <p class="subtitle">管理您的短链接，支持文本、转发和跳转三种类型</p>

        <div class="controls">
            <div class="controls-left">
                <input type="text" id="apiKeyInput" class="api-input" placeholder="输入API_KEY" />
                <button class="btn btn-load" id="loadBtn">
                    <i class="fas fa-cloud-download-alt"></i> 加载
                </button>
                <div class="link-count">
                    链接数: <span id="linkCount">9</span>
                </div>
            </div>
            
            <div class="controls-right">
                <button class="btn btn-save-all" id="saveAllBtn">
                    <i class="fas fa-save"></i> 保存所有
                </button>
            </div>
        </div>

        <!-- 修复：移除style="display: none;" -->
        <div id="statusMessage" class="status-message"></div>

        <div class="table-container">
            <table id="linksTable">
                <thead>
                    <tr>
                        <th>链接 (单击复制，双击刷新)</th>
                        <th>内容</th>
                        <th>类型</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // 生成随机唯一链接
        function generateRandomLink() {
            const chars = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let randomString = '';
            for (let i = 0; i < 10; i++) {
                randomString += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return window.location.origin + `/s/${randomString}`;
        }

        // 显示状态消息
        function showStatus(message, type = 'info') {
            const statusElement = document.getElementById('statusMessage');
            
            // 清除所有状态类
            statusElement.className = 'status-message';
            statusElement.classList.remove('status-success', 'status-error', 'status-info', 'status-warning', 'show');
            
            // 设置消息内容和样式
            statusElement.textContent = message;
            statusElement.classList.add(`status-${type}`);
            
            // 触发重绘
            void statusElement.offsetWidth;
            
            // 显示消息
            statusElement.classList.add('show');
            
            // 状态消息5秒后自动隐藏，但错误消息保持10秒
            const hideTime = type === 'error' ? 10000 : 5000;
            setTimeout(() => {
                statusElement.classList.remove('show');
            }, hideTime);
        }

        // 从服务器加载数据
        async function loadDataFromServer() {
            const apiKey = document.getElementById('apiKeyInput').value.trim();
            if (!apiKey) {
                showStatus('请先输入API_KEY', 'error');
                return false;
            }

            showStatus('正在从服务器加载数据...', 'info');
            
            // 禁用加载按钮避免重复点击
            const loadBtn = document.getElementById('loadBtn');
            loadBtn.disabled = true;
            loadBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 加载中...';

            try {
                const response = await fetch('/edit/links', {
                    headers: {
                        'Authorization': `Bearer ${apiKey}`
                    }
                });
                
                if (!response.ok) {
                    if (response.status === 401) {
                        throw new Error('API_KEY无效或已过期');
                    } else if (response.status === 404) {
                        throw new Error('服务器未找到数据，请先保存数据到服务器');
                    } else if (response.status === 403) {
                        throw new Error('API_KEY权限不足');
                    } else {
                        throw new Error(`HTTP错误! 状态码: ${response.status}`);
                    }
                }
                
                const remoteData = await response.json();
                console.log('从服务器加载的数据:', remoteData);

                // 如果有远程数据，覆盖当前数据
                if (remoteData && typeof remoteData === 'object' && Object.keys(remoteData).length > 0) {
                    const rowIds = ['row1', 'row2', 'row3', 'row4', 'row5', 'row6', 'row7', 'row8', 'row9'];
                    let updatedCount = 0;

                    rowIds.forEach(rowId => {
                        if (remoteData[rowId]) {
                            // 更新行数据
                            updateRowData(rowId, remoteData[rowId]);
                            updatedCount++;
                        }
                    });

                    if (updatedCount > 0) {
                        showStatus(`成功从服务器加载 ${updatedCount} 条链接数据`, 'success');
                    } else {
                        showStatus('服务器返回了数据，但没有可用的链接数据', 'warning');
                    }
                    return true;
                } else {
                    showStatus('服务器中没有数据，保留当前表格', 'info');
                    return false;
                }
            } catch (error) {
                console.error('加载远程数据失败:', error);
                showStatus(`加载失败: ${error.message}`, 'error');
                return false;
            } finally {
                // 重新启用加载按钮
                loadBtn.disabled = false;
                loadBtn.innerHTML = '<i class="fas fa-cloud-download-alt"></i> 加载';
            }
        }

        // 更新行数据
        function updateRowData(rowId, linkData) {
            const linkElement = document.getElementById(`link-${rowId}`);
            const noteElement = document.getElementById(`note-${rowId}`);
            const typeElement = document.getElementById(`type-${rowId}`);
            
            if (linkElement && linkData.link) {
                linkElement.textContent = linkData.link;
            }
            
            if (noteElement && linkData.note !== undefined) {
                noteElement.value = linkData.note;
            }
            
            if (typeElement && linkData.type) {
                typeElement.value = linkData.type;
            }
        }

        // 双击链接重新生成链接
        function regenerateLink(linkElement, rowId) {
            const newLink = generateRandomLink();
            linkElement.textContent = newLink;

            const noticeElement = document.getElementById(`notice-${rowId}`);
            noticeElement.textContent = '链接已重新生成！';
            noticeElement.style.color = '#3498db';
            noticeElement.style.display = 'block';

            setTimeout(() => {
                noticeElement.style.display = 'none';
            }, 2000);
        }

        // 复制链接到剪贴板
        function copyToClipboard(linkElement, noticeElement) {
            const link = linkElement.textContent;
            navigator.clipboard.writeText(link).then(() => {
                noticeElement.style.display = 'block';
                noticeElement.textContent = '链接已复制到剪贴板！';

                setTimeout(() => {
                    noticeElement.style.display = 'none';
                }, 2000);
            }).catch(err => {
                console.error('复制失败: ', err);
                noticeElement.style.display = 'block';
                noticeElement.textContent = '复制失败，请手动选择并复制';
                noticeElement.style.color = '#e74c3c';

                setTimeout(() => {
                    noticeElement.style.display = 'none';
                    noticeElement.style.color = '#27ae60';
                }, 2000);
            });
        }

        // 保存所有行数据
        async function saveAllRows() {
            const apiKey = document.getElementById('apiKeyInput').value.trim();
            if (!apiKey) {
                showStatus('请先输入API_KEY', 'error');
                return;
            }

            const rows = document.querySelectorAll('.link-row');
            if (rows.length === 0) {
                showStatus('没有可保存的数据！', 'error');
                return;
            }

            let savedCount = 0;
            const allData = {};

            rows.forEach(row => {
                const rowId = row.id.split('-')[1];
                const link = document.querySelector(`#link-${rowId}`).textContent;
                const note = document.querySelector(`#note-${rowId}`).value;
                const type = document.querySelector(`#type-${rowId}`).value;

                allData[rowId] = { link, note, type };
                savedCount++;
            });

            showStatus('正在保存数据到服务器...', 'info');
            
            // 禁用保存按钮避免重复点击
            const saveBtn = document.getElementById('saveAllBtn');
            const originalHtml = saveBtn.innerHTML;
            saveBtn.disabled = true;
            saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 保存中...';

            try {
                console.log('正在发送数据到服务器:', {
                    url: '/edit/links',
                    apiKey: apiKey ? '已设置' : '未设置',
                    dataCount: savedCount
                });
                
                const response = await fetch('/edit/links', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify(allData)
                });

                if (!response.ok) {
                    if (response.status === 401) {
                        throw new Error('API_KEY无效，请检查API_KEY设置');
                    } else if (response.status === 403) {
                        throw new Error('API_KEY权限不足');
                    } else if (response.status === 400) {
                        throw new Error('请求数据格式错误');
                    } else {
                        const errorText = await response.text();
                        console.error('服务器错误响应:', errorText);
                        throw new Error(`服务器保存失败，状态码: ${response.status}, 响应: ${errorText.substring(0, 100)}`);
                    }
                }
                
                const data = await response.json();
                console.log('服务器保存成功:', data);
                showStatus(`✅ 已成功保存 ${savedCount} 条链接数据到服务器`, 'success');
                
                // 保存成功后显示保存的时间
                setTimeout(() => {
                    const now = new Date();
                    const timeStr = now.toLocaleTimeString('zh-CN', { 
                        hour: '2-digit', 
                        minute: '2-digit',
                        second: '2-digit'
                    });
                    showStatus(`数据已保存 (${timeStr})`, 'info');
                }, 1000);
                
            } catch (error) {
                console.error('服务器保存失败:', error);
                showStatus(`❌ 保存失败: ${error.message}`, 'error');
            } finally {
                // 重新启用保存按钮
                saveBtn.disabled = false;
                saveBtn.innerHTML = originalHtml;
            }
        }

        // 添加一行
        function addRow(rowId, linkData = null) {
            const link = linkData ? linkData.link : generateRandomLink();
            const note = linkData ? linkData.note : '';
            const type = linkData ? linkData.type : '文本';

            const newRow = document.createElement('tr');
            newRow.id = `row-${rowId}`;
            newRow.className = 'link-row';

            newRow.innerHTML = `
            <td class="link-cell">
                <a href="#" class="link" id="link-${rowId}">${link}</a>
                <div class="copied-notice" id="notice-${rowId}"></div>
            </td>
            <td class="textarea-cell">
                <textarea id="note-${rowId}" placeholder="为链接添加内容...">${note}</textarea>
            </td>
            <td class="select-cell">
                <select id="type-${rowId}">
                    <option value="文本" ${type === '文本' ? 'selected' : ''}>文本</option>
                    <option value="转发" ${type === '转发' ? 'selected' : ''}>转发</option>
                    <option value="跳转" ${type === '跳转' ? 'selected' : ''}>跳转</option>
                </select>
            </td>
        `;

            document.getElementById('tableBody').appendChild(newRow);

            // 添加点击复制功能
            const linkElement = document.getElementById(`link-${rowId}`);
            const noticeElement = document.getElementById(`notice-${rowId}`);

            linkElement.addEventListener('click', function (e) {
                e.preventDefault();
                copyToClipboard(linkElement, noticeElement);
            });

            // 双击重新生成链接
            linkElement.addEventListener('dblclick', function (e) {
                e.preventDefault();
                regenerateLink(linkElement, rowId);
            });
        }

        // 创建初始9行
        function createInitialRows() {
            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = '';

            const rowIds = ['row1', 'row2', 'row3', 'row4', 'row5', 'row6', 'row7', 'row8', 'row9'];

            rowIds.forEach(rowId => {
                addRow(rowId);
            });

            // 链接计数显示为9
            document.getElementById('linkCount').textContent = '9';
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', function () {
            // 初始创建9行
            createInitialRows();

            // 加载按钮事件
            document.getElementById('loadBtn').addEventListener('click', loadDataFromServer);
            
            // 保存所有按钮事件
            document.getElementById('saveAllBtn').addEventListener('click', saveAllRows);

            // API_KEY输入框支持回车加载
            document.getElementById('apiKeyInput').addEventListener('keydown', function (e) {
                if (e.key === 'Enter') {
                    loadDataFromServer();
                }
            });
        });
    </script>
</body>
</html>
